name: Update IPTV Playlist

on:
  schedule:
    # Run everyday at 02:00 UTC (7:00 AM PKT / 7:30 AM IST)
    - cron: '0 2 * * *'
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  update-playlist:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run build script
        run: python build.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add playlist.m3u playlists/SouthAsia.m3u
          
          # Check if there are changes
          if ! git diff --cached --quiet; then
            git commit -m "Auto-update IPTV playlist [skip ci]"
            git push
          else
            echo "No changes detected in playlist.m3u or playlists/SouthAsia.m3u."
          fi
